name: chatra_app
description: Chatra - Education Platform
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.2.2
  open_file: ^3.3.2
  path_provider: ^2.1.2
  flutter_native_splash: ^2.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1
flutter:
  uses-material-design: true
  assets:
    - assets/logo-icon.png
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  # iOS forbids alpha in the app icon — flatten onto a white background.
  image_path_ios: "assets/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
